version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mobile-shop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mobile_shop
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  consul:
    image: hashicorp/consul:1.17
    container_name: mobile-shop-consul
    command: agent -dev -client=0.0.0.0
    ports:
      - "8500:8500"

  auth-service:
    image: node:20-alpine
    container_name: auth-service
    working_dir: /app
    volumes:
      - ./services/auth-service:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 4001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: mobile_shop
      JWT_SECRET: dev_secret_change_me
    depends_on:
      - mysql
    ports:
      - "4001:4001"

  catalog-service:
    image: node:20-alpine
    container_name: catalog-service
    working_dir: /app
    volumes:
      - ./services/catalog-service:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 4002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: mobile_shop
      JWT_SECRET: dev_secret_change_me
    depends_on:
      - mysql
    ports:
      - "4002:4002"

  order-service:
    image: node:20-alpine
    container_name: order-service
    working_dir: /app
    volumes:
      - ./services/order-service:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 4003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: mobile_shop
      JWT_SECRET: dev_secret_change_me
    depends_on:
      - mysql
    ports:
      - "4003:4003"

  gateway:
    image: node:20-alpine
    container_name: mobile-shop-gateway
    working_dir: /app
    volumes:
      - ./gateway:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:4001
      CATALOG_SERVICE_URL: http://catalog-service:4002
      ORDER_SERVICE_URL: http://order-service:4003
      CONSUL_URL: http://consul:8500
    depends_on:
      - auth-service
      - catalog-service
      - order-service
    ports:
      - "8080:8080"

volumes:
  mysql_data:
