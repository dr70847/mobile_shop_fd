version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mobile-shop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mobile_shop
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  consul:
    image: hashicorp/consul:1.17
    container_name: mobile-shop-consul
    command: agent -dev -client=0.0.0.0
    ports:
      - "8500:8500"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: mobile-shop-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: mobile-shop-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: mobile-shop-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

  auth-service:
    image: node:20-alpine
    container_name: auth-service
    working_dir: /app
    volumes:
      - ./services/auth-service:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 4001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: mobile_shop
      JWT_SECRET: dev_secret_change_me
    depends_on:
      - mysql
      - rabbitmq
    ports:
      - "4001:4001"

  catalog-service:
    image: node:20-alpine
    container_name: catalog-service
    working_dir: /app
    volumes:
      - ./services/catalog-service:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 4002
      GRPC_PORT: 50052
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: mobile_shop
      JWT_SECRET: dev_secret_change_me
    depends_on:
      - mysql
      - kafka
    ports:
      - "4002:4002"
      - "50052:50052"

  order-service:
    image: node:20-alpine
    container_name: order-service
    working_dir: /app
    volumes:
      - ./services/order-service:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 4003
      RABBITMQ_URL: amqp://rabbitmq:5672
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: order-created
      INVENTORY_GRPC_URL: catalog-service:50052
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: mobile_shop
      JWT_SECRET: dev_secret_change_me
    depends_on:
      - mysql
      - rabbitmq
      - kafka
      - catalog-service
    ports:
      - "4003:4003"

  inventory-service:
    build:
      context: ./services/inventory-service-spring
      dockerfile: Dockerfile
    container_name: inventory-service
    environment:
      SERVER_PORT: 8081
    ports:
      - "8081:8081"

  admin-service:
    build:
      context: ./services/admin-service-django
      dockerfile: Dockerfile
    container_name: admin-service
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
    ports:
      - "8001:8001"

  gateway:
    image: node:20-alpine
    container_name: mobile-shop-gateway
    working_dir: /app
    volumes:
      - ./gateway:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:4001
      CATALOG_SERVICE_URL: http://catalog-service:4002
      ORDER_SERVICE_URL: http://order-service:4003
      INVENTORY_SERVICE_URL: http://inventory-service:8081
      ADMIN_SERVICE_URL: http://admin-service:8001
      CONSUL_URL: http://consul:8500
    depends_on:
      - auth-service
      - catalog-service
      - order-service
      - inventory-service
      - admin-service
    ports:
      - "8080:8080"

volumes:
  mysql_data:
